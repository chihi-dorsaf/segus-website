<div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-body p-0">
        <div class="container-fluid">
          <div class="row gy-4">
            <div class="col-lg-4 col-sm-12 bg-cover" style="background-image: url(assets/img/c2.jpg); min-height:300px;">
            </div>
            <div class="col-lg-8">
              <form class="p-lg-5 col-12 row g-3">
                <div>
                  <h1>Get in Touch</h1>
                  <p>Feel free to contact us, and we will get back to you as soon as possible.</p>
                </div>
                <div class="col-lg-6">
                  <label for="firstName" class="form-label">First Name</label>
                  <input type="text" class="form-control" placeholder="John" id="firstName">
                </div>
                <div class="col-lg-6">
                  <label for="lastName" class="form-label">Last Name</label>
                  <input type="text" class="form-control" placeholder="Doe" id="lastName">
                </div>
                <div class="col-12">
                  <label for="email" class="form-label">Email Address</label>
                  <input type="email" class="form-control" placeholder="johndoe@example.com" id="email">
                </div>
                <div class="col-12">
                  <label for="message" class="form-label">Enter Message</label>
                  <textarea placeholder="This is looking great and nice." class="form-control" id="message" rows="4"></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-brand">Send Message</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
